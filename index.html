<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Where Is My Car - Parking Helper</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 text-slate-900 overflow-x-hidden no-scrollbar">

    <!-- Loading Screen -->
    <div id="loading-screen" class="fixed inset-0 z-50 bg-white flex flex-col items-center justify-center transition-all duration-500">
        <div class="w-16 h-16 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="text-blue-600 font-bold animate-pulse">데이터 연결 중...</p>
    </div>

    <div class="max-w-md mx-auto min-h-screen flex flex-col pb-24">
        <!-- Header -->
        <header class="p-6 pb-2">
            <div class="flex items-center justify-between mb-4">
                <div class="flex items-center gap-2">
                    <div class="bg-blue-600 p-2 rounded-xl shadow-lg shadow-blue-200">
                        <i data-lucide="car" class="w-6 h-6 text-white"></i>
                    </div>
                    <h1 class="text-xl font-bold tracking-tight">주차 메모리</h1>
                </div>
                <div id="distance-badge" class="px-2 py-1 rounded-full text-[10px] font-bold border bg-gray-50 text-gray-400 border-gray-200">
                    위치 추적 중
                </div>
            </div>
            
            <div class="bg-white p-4 rounded-2xl border border-gray-100 shadow-sm mb-6 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="bg-blue-50 p-3 rounded-xl">
                        <i data-lucide="map-pin" class="w-5 h-5 text-blue-600"></i>
                    </div>
                    <div>
                        <p class="text-[11px] text-gray-400 font-medium uppercase tracking-wider">주차 타워 거리</p>
                        <p id="distance-text" class="text-sm font-bold">거리 측정 중...</p>
                    </div>
                </div>
                <div class="text-right">
                    <div id="status-text" class="text-[10px] text-green-500 font-bold mb-1 italic">시스템 준비됨</div>
                    <div class="w-2 h-2 bg-green-500 rounded-full ml-auto animate-pulse"></div>
                </div>
            </div>

            <!-- Floor Tabs -->
            <div class="flex gap-2 p-1 bg-gray-100 rounded-2xl mb-6">
                <button id="tab-B1" onclick="switchFloor('B1')" class="floor-tab flex-1 py-3 rounded-xl font-bold transition-all bg-blue-600 text-white shadow-lg shadow-blue-200">B1</button>
                <button id="tab-B2" onclick="switchFloor('B2')" class="floor-tab flex-1 py-3 rounded-xl font-bold transition-all bg-gray-100 text-gray-400 hover:bg-white">B2</button>
                <button id="tab-B3" onclick="switchFloor('B3')" class="floor-tab flex-1 py-3 rounded-xl font-bold transition-all bg-gray-100 text-gray-400 hover:bg-white">B3</button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="px-6 flex-1">
            <div class="flex items-center justify-between mb-4 px-1">
                <h2 id="floor-indicator" class="text-sm font-bold text-slate-400 uppercase tracking-widest">B1 Floor Map</h2>
                <div class="flex items-center gap-1">
                    <div class="w-2 h-2 bg-blue-500 rounded-full"></div>
                    <span class="text-[10px] text-slate-400 font-bold">주차됨</span>
                </div>
            </div>

            <!-- Parking Grid -->
            <div id="parking-grid" class="grid grid-cols-4 gap-3 mb-8">
                <!-- Grid items rendered by main.js -->
            </div>

            <!-- History List -->
            <div class="mb-4">
                <h3 class="text-sm font-bold text-slate-800 mb-4 px-1 flex items-center gap-2">
                    <i data-lucide="list" class="w-4 h-4 text-blue-600"></i> 최근 주차 기록
                </h3>
                <div id="record-list" class="space-y-3">
                    <!-- Record items rendered by main.js -->
                </div>
            </div>
        </main>
    </div>

    <!-- Proximity Alert -->
    <div id="proximity-alert" class="hidden fixed bottom-6 left-6 right-6 bg-blue-600 text-white p-5 rounded-3xl shadow-2xl shadow-blue-300 z-40 animate-bounce">
        <div class="flex items-center justify-between mb-2">
            <div class="flex items-center gap-2">
                <i data-lucide="bell-ring" class="w-5 h-5"></i>
                <span class="font-bold">목적지 도착!</span>
            </div>
            <button onclick="closeAlert()" class="opacity-70"><i data-lucide="x" class="w-4 h-4"></i></button>
        </div>
        <p class="text-xs opacity-90 leading-relaxed mb-4">주차장에 도착하셨나요? 잊지 말고 주차 위치를 기록해 주세요.</p>
        <button onclick="closeAlert()" class="w-full py-2 bg-white text-blue-600 rounded-xl font-bold text-xs shadow-sm">네, 기록할게요</button>
    </div>

          appId: "1:577812265050:web:15314359819d32d973c063"
        });
    </script>
    <script type="module" src="main.js"></script>
</body>
</html>
